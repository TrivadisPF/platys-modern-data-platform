[agent]
  interval = "5s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "5s"
  flush_jitter = "0s"
  precision = ""
  debug = true
  quiet = false
  logfile = ""
  hostname = "$HOSTNAME"
  omit_hostname = false

[[outputs.influxdb_v3]]
  ## The URLs of the InfluxDB cluster nodes.
  ##
  ## Multiple URLs can be specified for a single cluster, only ONE of the
  ## urls will be written to each interval.
  ##   ex: urls = ["https://us-west-2-1.aws.cloud2.influxdata.com"]
  urls = ["http://influxdb3:8181"]

  ## Token for authentication.
  token = "$INFLUXDB_TOKEN"

  ## Organization is the name of the organization you wish to write to; must exist.
  database = "$INFLUXDB_DATABASE"

  ## The value of this tag will be used to determine the database. If this
  ## tag is not set the 'database' option is used as the default.
  # database_tag = ""

  ## If true, the database tag will not be added to the metric
  # exclude_database_tag = false

  ## Wait for WAL persistence to complete synchronization
  ## Setting this to false reduces latency but increases the risk of data loss.
  ## See https://docs.influxdata.com/influxdb3/enterprise/write-data/http-api/v3-write-lp/#use-no_sync-for-immediate-write-responses
  # sync = true

  ## Enable or disable conversion of unsigned integer fields to signed integers
  ## This is useful if existing data exist as signed integers e.g. from previous
  ## versions of InfluxDB.
  # convert_uint_to_int = false

  ## Omit the timestamp of the metrics when sending to allow InfluxDB to set the
  ## timestamp of the data during ingestion. You likely want this to be false
  ## to submit the metric timestamp
  # omit_timestamp = false

  ## HTTP User-Agent
  # user_agent = "telegraf"

  ## Amount of time allowed to complete the HTTP request
  # timeout = "5s"

# Generate metrics for test and demonstration purposes
[[inputs.mock]]
  ## Set the metric name to use for reporting
  metric_name = "mock"

  ## Optional string key-value pairs of tags to add to all metrics
  [inputs.mock.tags]
  "key" = "abc"

  ## One or more mock data fields *must* be defined.
  [[inputs.mock.constant]]
    name = "constant"
    value = "value1"
  [[inputs.mock.random]]
    name = "rand"
    min = 1.0
    max = 6.0
  [[inputs.mock.sine_wave]]
    name = "wave"
    amplitude = 1.0
    period = 0.5
    phase = 20.0
    base_line = 0.0
  [[inputs.mock.step]]
    name = "plus_one"
    start = 0.0
    step = 1.0
  [[inputs.mock.stock]]
    name = "abc"
    price = 50.00
    volatility = 0.2