[agent]
  interval = "5s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "5s"
  flush_jitter = "0s"
  precision = ""
  debug = true
  quiet = false
  logfile = ""
  hostname = "$HOSTNAME"
  omit_hostname = false

[[outputs.influxdb_v2]]
  ## The URLs of the InfluxDB cluster nodes.
  ##
  ## Multiple URLs can be specified for a single cluster, only ONE of the
  ## urls will be written to each interval.
  ##   ex: urls = ["https://us-west-2-1.aws.cloud2.influxdata.com"]
  urls = ["http://influxdb2:8086"]

  ## Token for authentication.
  token = "$INFLUXDB_TOKEN"

  ## Organization is the name of the organization you wish to write to; must exist.
  organization = "$INFLUXDB_ORGANIZATION"

  ## Destination bucket to write into.
  bucket = "$INFLUXDB_BUCKET"

  ## The value of this tag will be used to determine the bucket.  If this
  ## tag is not set the 'bucket' option is used as the default.
  # bucket_tag = ""

  ## If true, the bucket tag will not be added to the metric.
  # exclude_bucket_tag = false

  ## Timeout for HTTP messages.
  # timeout = "5s"

# Generate metrics for test and demonstration purposes
[[inputs.mock]]
  ## Set the metric name to use for reporting
  metric_name = "mock"

  ## Optional string key-value pairs of tags to add to all metrics
  [inputs.mock.tags]
  "key" = "abc"

  ## One or more mock data fields *must* be defined.
  [[inputs.mock.constant]]
    name = "constant"
    value = "value1"
  [[inputs.mock.random]]
    name = "rand"
    min = 1.0
    max = 6.0
  [[inputs.mock.sine_wave]]
    name = "wave"
    amplitude = 1.0
    period = 0.5
    phase = 20.0
    base_line = 0.0
  [[inputs.mock.step]]
    name = "plus_one"
    start = 0.0
    step = 1.0
  [[inputs.mock.stock]]
    name = "abc"
    price = 50.00
    volatility = 0.2


