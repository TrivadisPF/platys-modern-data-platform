name: RustFS
id: rustfs
type: engine
arch: [x86-64]

links:
  website: https://rustfs.com
  documentation: https://docs.rustfs.com
  github: https://github.com/rustfs/rustfs

description: >
  RustFS is an open-source, S3-compatible high-performance object storage system
  written in Rust, supporting migration and coexistence with other S3-compatible
  platforms such as MinIO and Ceph.

enable:
  platys_init: RUSTFS
  example: |
    platys init --enable-services RUSTFS
    platys gen

usage:
  - title: Open the RustFS console
    content: |
      Navigate to <http://dataplatform:9014>.
      Log in with the configured `RUSTFS_access_key` and `RUSTFS_secret_key`.

parameters:
  - name: RUSTFS_enable
    default: "false"
    since: "1.20.0"
    description: >
      Enable RustFS object storage service.

  - name: RUSTFS_volume_map_data
    default: "false"
    since: "1.20.0"
    description: >
      Volume map the data folder into the container.

  - name: RUSTFS_volume_map_logs
    default: "false"
    since: "1.20.0"
    description: >
      Volume map the logs folder into the container.

  - name: RUSTFS_access_key
    default: "admin"
    since: "1.20.0"
    description: >
      S3 access key used to authenticate with RustFS.

  - name: RUSTFS_secret_key
    default: "abc123abc123!"
    since: "1.20.0"
    sensitive: true
    description: >
      S3 secret key used to authenticate with RustFS.

  - name: RUSTFS_admin_bucket_name
    default: "admin-bucket"
    since: "1.20.0"
    description: >
      Name of the admin bucket created and used on startup.

  - name: RUSTFS_buckets
    default: ""
    since: "1.20.0"
    description: >
      Comma-separated list of additional buckets to create on startup.

  - name: RUSTFS_console_enabled
    default: "true"
    since: "1.20.0"
    description: >
      Enable the RustFS web console UI.

  - name: RUSTFS_upload_data_transfer_to_bucket_enabled
    default: "false"
    since: "1.20.0"
    description: >
      Upload the contents of the /data-transfer folder into RustFS on container startup.
      The target bucket is specified in RUSTFS_upload_data_transfer_bucket_name.

  - name: RUSTFS_upload_data_transfer_bucket_name
    default: "data-transfer-bucket"
    since: "1.20.0"
    applicable_when: "RUSTFS_upload_data_transfer_to_bucket_enabled == true"
    description: >
      Name of the bucket to upload /data-transfer contents into.

  - name: RUSTFS_upload_data_transfer_subfolders
    default: ""
    since: "1.20.0"
    applicable_when: "RUSTFS_upload_data_transfer_to_bucket_enabled == true"
    description: >
      Comma-separated list of subfolders within /data-transfer to upload selectively.
      If empty, everything is uploaded recursively.
