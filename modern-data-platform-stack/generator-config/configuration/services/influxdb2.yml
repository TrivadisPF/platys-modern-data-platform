name: InfluxDB v2
id: influxdb2
type: engine
arch: [x86-64, arm]

links:
  website: https://www.influxdata.com/
  documentation: https://docs.influxdata.com/influxdb/latest/
  github: https://github.com/influxdata/influxdb

description: >
  InfluxDB v2 is an open source time series platform combining a multi-tenanted
  time series database, built-in UI and dashboarding tools, background processing,
  and a monitoring agent — all in a single binary.

enable:
  platys_init: INFLUXDB2
  example: |
    platys init --enable-services INFLUXDB2
    platys gen

usage:
  - title: Open the InfluxDB v2 UI
    content: |
      Navigate to <http://dataplatform:19999> and log in with the configured
      `INFLUXDB2_username` and `INFLUXDB2_password`.

  - title: InfluxDB CLI
    content: |
      ```bash
      docker exec -ti influxdb2 influx -h
      ```

  - title: InfluxQL interactive shell
    content: |
      ```bash
      docker exec -ti influxdb2 influx v1 shell
      ```

parameters:
  - name: INFLUXDB2_enable
    default: "false"
    since: "1.1.0"
    description: >
      Enable InfluxDB v2 service.

  - name: INFLUXDB2_volume_map_data
    default: "false"
    since: "1.1.0"
    description: >
      Volume map the data folder into the InfluxDB v2 container.

  - name: INFLUXDB2_volume_map_config
    default: "false"
    since: "1.14.0"
    description: >
      Volume map the config folder into the InfluxDB v2 container.

  - name: INFLUXDB2_username
    default: "influx"
    since: "1.14.0"
    description: >
      Username of the initial super-user created on first startup.

  - name: INFLUXDB2_password
    default: "abc123abc123!"
    since: "1.14.0"
    sensitive: true
    description: >
      Password of the initial super-user.

  - name: INFLUXDB2_org
    default: "platys"
    since: "1.14.0"
    description: >
      Name of the initial organisation created on first startup.

  - name: INFLUXDB2_bucket
    default: "demo-bucket"
    since: "1.14.0"
    description: >
      Name of the initial bucket created on first startup.

  - name: INFLUXDB2_admin_token
    default: ""
    since: "1.14.0"
    sensitive: true
    description: >
      Authentication token associated with the initial super-user. If empty,
      a token is auto-generated by InfluxDB on first startup.
