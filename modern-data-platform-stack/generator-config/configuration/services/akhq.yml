name: AKHQ
id: akhq
type: ui
arch: [x86-64, arm]

links:
  website: https://akhq.io/
  documentation: https://akhq.io/docs/
  github: https://github.com/tchiotludo/akhq

description: >
  Kafka GUI for Apache Kafka to manage topics, topic data, consumer groups,
  schema registry, Kafka Connect, and more.

enable:
  platys_init: AKHQ
  example: |
    platys init --enable-services AKHQ
    platys gen

usage:
  - title: Open the AKHQ UI
    content: |
      Navigate to <http://dataplatform:28107>.
      If authentication is enabled, log in with the configured username and password.

  - title: REST API
    content: |
      The REST API is available at <http://dataplatform:28107/api>.
      See <https://akhq.io/docs/api.html> for the full API reference.

  - title: Monitoring endpoints
    content: |
      ```
      http://dataplatform:28320/info
      http://dataplatform:28320/health
      http://dataplatform:28320/loggers
      http://dataplatform:28320/metrics
      http://dataplatform:28320/prometheus
      ```

parameters:
  - name: AKHQ_enable
    default: "false"
    since: "1.3.0"
    description: >
      Enable AKHQ (formerly KafkaHQ) service.

  - name: AKHQ_topic_page_size
    default: "25"
    since: "1.16.0"
    description: >
      Number of topics shown per page in the topic list.

  - name: AKHQ_topic_data_size
    default: "50"
    since: "1.16.0"
    description: >
      Maximum number of records shown per page when browsing topic data.

  - name: AKHQ_topic_data_poll_timeout
    default: "1000"
    since: "1.16.0"
    description: >
      Time in milliseconds to wait in poll when no data is available in the buffer.

  - name: AKHQ_topic_data_kafka_max_message_length
    default: "1000000"
    since: "1.16.0"
    description: >
      Maximum message length (in bytes) sent to the UI when retrieving topic records.

  - name: AKHQ_default_view
    default: "HIDE_INTERNAL"
    since: "1.16.0"
    allowed_values: [ALL, HIDE_INTERNAL, HIDE_INTERNAL_STREAM, HIDE_STREAM]
    description: >
      Default topic list view filter.

  - name: AKHQ_sort
    default: "OLDEST"
    since: "1.16.0"
    allowed_values: [OLDEST, NEWEST]
    description: >
      Default sort order when browsing topic data.

  - name: AKHQ_show_consumer_groups
    default: "true"
    since: "1.16.0"
    description: >
      Show the consumer groups column in the topic list.

  - name: AKHQ_show_all_consumer_groups
    default: "true"
    since: "1.16.0"
    description: >
      Expand the full consumer group list rather than showing only one group per topic.

  - name: AKHQ_show_last_record
    default: "true"
    since: "1.16.0"
    description: >
      Show the timestamp of the last record sent to each topic.

  - name: AKHQ_read_only_mode
    default: "false"
    since: "1.16.0"
    description: >
      Run AKHQ in read-only mode, preventing any write operations from the UI.

  - name: AKHQ_auth_enabled
    default: "false"
    since: "1.17.0"
    description: >
      Enable authentication for the AKHQ UI.

  - name: AKHQ_auth_type
    default: "basic"
    since: "1.17.0"
    allowed_values: [basic]
    applicable_when: "AKHQ_auth_enabled == true"
    description: >
      Authentication type. Currently only basic authentication is supported.

  - name: AKHQ_username
    default: "admin"
    since: "1.17.0"
    applicable_when: "AKHQ_auth_enabled == true"
    description: >
      Username for basic authentication.

  - name: AKHQ_password
    default: "admin"
    since: "1.17.0"
    sensitive: true
    applicable_when: "AKHQ_auth_enabled == true"
    description: >
      Password for basic authentication.
