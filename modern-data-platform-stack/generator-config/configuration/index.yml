version: "1.20.0"

configuration:
  - name: Overall Settings
    source: overall.yml

  - name: External Services
    source: external.yml

  - name: Internal Services
    source: services.yml
    sections:

      - name: Stream Processing
        description: >
          Real-time event streaming engines, brokers, and their management tooling.
          Includes the full Apache Kafka ecosystem — brokers, connectors, schema registry,
          stream processors (ksqlDB, Flink, Materialize, RisingWave), and all Kafka UIs and CLI tools.
          Zookeeper (required for Kafka 3.x and earlier) is listed under Infrastructure & Operations.
        services:
          - kafka
          - kafka-cli
          - automq
          - schema-registry
          - schema-registry-ui
          - kafka-connect
          - kafka-connect-ui
          - kafka-topics-ui
          - kafka-rest
          - kafka-mqtt
          - ksqldb
          - ksqldb-cli
          - materialize
          - risingwave
          - risingwave-mcp
          - risingwave-events-api
          - fluss
          - hstreamdb
          - flink
          - timeplus
          - arroyo
          - benthos
          - nussknacker
          - confluent-replicator
          - mirror-maker2
          - zilla
          - lenses-box
          - kcat
          - kaskade
          - kafkactl
          - jikkou
          - kadmin
          - cmak
          - kafdrop
          - akhq
          - kafka-ui
          - efak
          - redpanda-console
          - kouncil
          - kafka-magic
          - kafka-webview
          - kpow
          - conduktor-platform
          - kadeck
          - kafkistry
          - klaw
          - kafka-connector-board
          - streams-explorer
          - debezium-server
          - debezium-ui
          - shadowtraffic

      - name: Batch & Distributed Processing
        description: >
          Large-scale batch and distributed compute frameworks. Covers Apache Spark,
          Hadoop, Hive, and related engines for processing data at rest, plus document
          and unstructured data extraction tools (Tika, NLM Ingestor, Unstructured API).
        services:
          - hadoop
          - spark
          - spark-historyserver
          - spark-thriftserver
          - kyuubi
          - livy
          - hive
          - hive-metastore
          - hue
          - tika
          - nlm-ingestor
          - unstructured-api

      - name: Data Ingestion & Pipelines
        description: >
          Tools for moving and transforming data between systems. Covers visual pipeline
          designers (NiFi, StreamSets, Airbyte), workflow orchestrators (Airflow, Kestra,
          Mage), log shippers (Fluentd, Fluent Bit), and lightweight automation tools (n8n, Node-RED).
        services:
          - streamsets
          - streamsets-edge
          - streamsets-transformer
          - streamsets-dataops
          - nifi
          - nifi-registry
          - nifi-toolkit
          - monitofi
          - n8n
          - streampipes
          - cribl-stream
          - cribl-edge
          - conduit
          - fluentd
          - fluent-bit
          - filebeat
          - sqoop
          - nodered
          - streamsheets
          - spring-dataflow
          - airbyte
          - airflow
          - mage-ai
          - kestra
          - ofelia
          - penthao
          - dbt

      - name: Messaging & Event Brokers
        description: >
          Traditional message brokers, MQTT brokers, and IoT platforms. Covers
          ActiveMQ, RabbitMQ, NATS, Solace, and the full MQTT ecosystem
          (Mosquitto, HiveMQ, EMQX) with their management UIs and IoT device platforms.
        services:
          - activemq
          - rabbitmq
          - solace-pubsub
          - solace-kafka-proxy
          - nats
          - mosquitto
          - hivemq3
          - hivemq4
          - emqx
          - hivemq-ui
          - mqttx
          - mqtt-ui
          - cedalo-mc
          - thingsboard

      - name: File Transfer & Notifications
        description: >
          File transfer servers and local email testing tools. Covers FTP/SFTP servers
          (Pure-FTPd, SFTPgo) and mail catchers (Mailpit, Mailhog, MailDev) used to
          intercept outgoing email in development and test environments.
        services:
          - pure-ftpd
          - sftp
          - sftpgo
          - filezilla
          - maildev
          - mailpit
          - mailhog

      - name: Relational Databases
        description: >
          SQL-based relational database engines and their administration UIs. Covers
          PostgreSQL, MySQL, MariaDB, SQL Server, Oracle, and distributed SQL databases
          (CockroachDB, YugabyteDB, SingleStore), plus web-based query and admin tools.
        services:
          - postgresql
          - postgresql-mcp
          - postgrest
          - timescaledb
          - xtdb
          - mysql
          - mariadb
          - sqlserver
          - oracledb-ee
          - oracledb-xe
          - oracledb-free
          - oracledb-oci-free
          - oracle-adb
          - oracle-sqlcl
          - oracle-rest
          - cockroachdb
          - yugabyte
          - single-store
          - supabase
          - pgadmin
          - adminer
          - cloudbeaver
          - sqlpad
          - sqlchat
          - querybook
          - dbgate
          - nocodb

      - name: NoSQL & Document Stores
        description: >
          Non-relational databases for documents, key-value, wide-column, and search workloads.
          Covers MongoDB, Cassandra, Redis, Elasticsearch, OpenSearch, Solr, Splunk, Hazelcast,
          and Apache Ignite, together with their management UIs and exporters.
        services:
          - mongodb
          - admin-mongo
          - mongo-express
          - mongo-mcp
          - cassandra
          - cassandra-reaper
          - redis
          - redis-stack
          - redis-exporter
          - redis-insight
          - redis-mcp
          - redis-commander
          - valkey
          - memcached
          - solr
          - elasticsearch
          - elasticsearch-exporter
          - kibana
          - dejavu
          - cerebro
          - elastichq
          - elasticvue
          - opensearch
          - opensearch-dashboards
          - splunk
          - datastax
          - datastax-studio
          - hazelcast
          - hazelcast-mc
          - ignite
          - etcd
          - etcd-browser

      - name: Graph Databases
        description: >
          Graph database engines for storing and querying highly connected data.
          Covers property graph databases (Neo4j, ArcadeDB, Memgraph), RDF/triple stores
          (GraphDB, Jena-Fuseki, Stardog), and graph analytics tools (PuppyGraph, Graphiti).
        services:
          - neo4j
          - neo4j-mcp
          - neodash
          - janusgraph
          - gremlin-console
          - invana-engine
          - invana-studio
          - arcadedb
          - memgraph
          - dgraph
          - stardog
          - stardog-studio
          - graphdb
          - jena-fuseki
          - puppygraph
          - graphiti
          - quine
          - web-protege

      - name: Vector Databases
        description: >
          Databases optimised for storing and searching high-dimensional embeddings.
          Used as the retrieval backbone for RAG and semantic search applications.
          Covers Chroma, Qdrant, Weaviate, Milvus, and Infinity.
        services:
          - chroma
          - qdrant
          - weaviate
          - milvus
          - attu
          - infinity
          - vector-admin

      - name: Time Series & Metrics Stores
        description: >
          Databases and collectors optimised for time-stamped metrics and events.
          Covers the InfluxDB family, QuestDB, Prometheus (including exporters and
          alerting), Telegraf for metrics collection, and Tile38 for geospatial time series.
        services:
          - influxdb
          - influxdb2
          - influxdb3
          - influxdb3-explorer
          - telegraf
          - chronograf
          - kapacitor
          - questdb
          - prometheus
          - prometheus-pushgateway
          - prometheus-nodeexporter
          - prometheus-alertmanager
          - tile38

      - name: Object Storage & Data Lakehouse
        description: >
          S3-compatible object stores, open table format catalogs, and cloud storage tooling.
          Covers MinIO, RustFS, Garage, LakeFS, and the full catalog ecosystem (Project Nessie,
          Iceberg REST, Unity Catalog, Polaris, Gravitino, Lakekeeper) for managing data lakehouses.
        services:
          - minio
          - adminio
          - minio-web
          - minio-kes
          - rustfs
          - garage
          - garage-webui
          - filestash
          - s3manager
          - awscli
          - azurite
          - azurecli
          - azure-storage-explorer
          - pyiceberg
          - lakefs
          - lakectl
          - nessie
          - iceberg-rest-catalog
          - unity-catalog
          - lakekeeper
          - polaris
          - gravitino
          - nimtable
          - lakevision

      - name: Query & Analytical Engines
        description: >
          Distributed query engines and OLAP databases for analytical workloads.
          Covers federated query engines (Trino, Presto, Dremio, Drill), embedded analytics
          (DuckDB), real-time OLAP stores (Druid, Pinot, ClickHouse, StarRocks), and API
          query layers (Hasura, Directus, GraphQL Mesh).
        services:
          - trino
          - trino-gateway
          - trino-lb
          - presto
          - dremio
          - drill
          - duckdb
          - quackflight
          - druid
          - pinot
          - clickhouse
          - clickhouse-ui
          - starrocks
          - kudu
          - hasura
          - graphql-mesh
          - directus

      - name: Event Sourcing & CQRS
        description: >
          Infrastructure for event-sourced architectures and CQRS patterns.
          Covers Axon Server for command/event routing, EventStore for append-only event
          persistence, and Quix for real-time event-driven pipeline management.
        services:
          - axon-server
          - eventstore
          - quix

      - name: AI, LLM & Agents
        description: >
          Large language model runtimes, chat UIs, autonomous agent frameworks, and
          supporting tools. Covers model servers (Ollama, LocalAI, LiteLLM), chat interfaces,
          agent builders (Flowise, Langflow, AutoGen), RAG platforms, MCP tooling, and
          NLP utilities (Whisper, Presidio).
        services:
          - ollama
          - nvidia-nim
          - local-ai
          - litellm
          - open-webui
          - better-chatbot
          - alpaca-webui
          - anything-llm
          - perplexica
          - big-agi
          - autogen-studio
          - crewai-studio
          - agent-zero
          - flowise
          - langflow
          - openclaw
          - gpt-researcher
          - local-deep-researcher
          - verba
          - ragflow
          - searxng
          - crawl4ai
          - firecrawl
          - mcp-inspector
          - mcp-toolbox
          - centralmind-gateway
          - trino-mcp
          - neo4j-mcp
          - presidio-analyzer
          - presidio-anonymizer
          - whisper
          - nllb
          - audio-transcriber

      - name: Data Science & MLOps
        description: >
          Interactive notebooks, experiment tracking, and ML lifecycle management.
          Covers notebook environments (Jupyter, Zeppelin, RStudio), ML experiment tracking
          (MLflow, Optuna), and LLM observability platforms (Langfuse, Arize Phoenix, OpenLIT).
        services:
          - jupyter
          - jupyterhub
          - zeppelin
          - anaconda
          - rstudio
          - shiny
          - dataiku
          - mlflow
          - optuna
          - mindsdb
          - langfuse
          - openlit
          - langwatch
          - langevals
          - arize-phoenix
          - kie-server

      - name: BI, Analytics & Visualization
        description: >
          Business intelligence, self-service analytics, and dashboard platforms.
          Covers full BI suites (Metabase, Superset, Lightdash, Redash), embedded analytics
          (Cube.js), app frameworks (Streamlit), low-code builders (Retool, ToolJet), and
          real-time dashboard tools (Smashing, Tipboard).
        services:
          - metabase
          - lightdash
          - superset
          - redash
          - cubejs
          - streamlit
          - smashing
          - tipboard
          - chartboard
          - retool
          - tooljet
          - baserow

      - name: Observability & Monitoring
        description: >
          Distributed tracing, log aggregation, metrics visualisation, and health monitoring.
          Covers the OpenTelemetry collector, tracing backends (Jaeger, Zipkin), the Loki/Tempo/Grafana
          stack, Kafka consumer lag monitors, and container-level monitoring (cAdvisor, Glances).
        services:
          - otel-collector
          - zipkin
          - zipkin-dependencies
          - jaeger
          - pitchfork
          - promtail
          - loki
          - tempo
          - grafana
          - spring-boot-admin
          - hawtio
          - kafka-lag-exporter
          - klag
          - remora
          - burrow
          - burrow-dashboard
          - burrow-ui
          - cruise-control
          - cadvisor
          - glances
          - postgresql-exporter

      - name: Data Governance & Catalog
        description: >
          Data cataloguing, lineage tracking, and metadata management platforms.
          Covers enterprise data catalogs (DataHub, OpenMetadata, Amundsen, Apache Atlas),
          open data portals (CKAN, Dataverse), lineage trackers (Marquez), and data format
          inspection tools (Avro Tools, Parquet Tools).
        services:
          - avro-tools
          - parquet-tools
          - atlas
          - datahub
          - openmetadata
          - odd-platform
          - amundsen
          - data-product-portal
          - dataverse
          - ckan
          - marquez

      - name: Security & Access Control
        description: >
          Authentication, authorisation, and policy enforcement services.
          Covers policy engines (OPA, Cedar, Apache Ranger), identity providers (Keycloak,
          Authelia, Curity), LDAP directories, and secrets management (Vault).
        services:
          - ranger
          - opa
          - styra-opa
          - cedar
          - opal
          - openldap
          - php-ldap-admin
          - ldap-user-manager
          - vault
          - keycloak
          - authelia
          - curity

      - name: API Management & Design
        description: >
          API gateways, design tools, testing, and data contract management.
          Covers gateways (Kong, Tyk), API design and documentation (Swagger, AsyncAPI),
          mocking and contract testing (Microcks, MockServer, Pact), and data contract
          lifecycle tools.
        services:
          - kong-gateway
          - kong-deck
          - konga
          - kong-admin-ui
          - kong-map
          - tyk-gateway
          - tyk-dashboard
          - tyk-pump
          - swagger-editor
          - swagger-ui
          - asyncapi-studio
          - postman
          - pact-broker
          - microcks
          - mockserver
          - data-mesh-manager
          - data-contract-manager
          - data-contract-editor
          - data-contract-cli
          - data-contract-cli-api

      - name: Process Orchestration
        description: >
          Business process management and workflow automation engines.
          Covers the full Camunda platform (BPM, Zeebe, Operate, Optimize) for BPMN-based
          process orchestration, plus Softproject X4 and IOEvent for event-driven workflows.
        services:
          - camunda-bpm-platform
          - camunda-optimize
          - camunda-zeebe
          - camunda-operate
          - camunda-zeeqs
          - x4-server
          - ioevent-cockpit

      - name: Development & Productivity
        description: >
          Developer tooling, productivity apps, and in-browser utilities bundled with the platform.
          Covers browser-based IDEs (Code-Server), diagramming (draw.io, Excalidraw), project
          management (Taiga, Focalboard), documentation viewers, file browsers, and serverless
          runtimes (Nuclio, Python).
        services:
          - code-server
          - taiga
          - taskcafe
          - focalboard
          - excalidraw
          - drawio
          - firefox
          - browserless
          - filebrowser
          - wetty
          - raneto
          - markdown-madness
          - markdown-viewer
          - markdown-renderer
          - log4brains
          - mendix
          - python
          - nuclio

      - name: Infrastructure & Operations
        description: >
          Container management, CI/CD, and platform operations tooling.
          Covers container UIs (Portainer, Rancher), tunnelling (ngrok), Docker-in-Docker,
          CI/CD (Jenkins, Allure), and housekeeping utilities (Watchtower, S3FS, Git Web).
          Also includes Zookeeper, the distributed coordination service required by Kafka 3.x and earlier.
        services:
          - zookeeper
          - zoonavigator
          - portainer
          - docker-exec-webconsole
          - rancher
          - cetusguard
          - ngrok
          - docker-dind
          - jenkins
          - allure
          - gitweb
          - s3fs
          - watchtower

      - name: Healthcare & FHIR
        description: >
          Clinical data management and health interoperability services.
          Covers FHIR R4/R5 servers (HAPI FHIR, Blaze, LinuxForHealth), the openEHR
          platform (EHRBase), and integration gateways for healthcare data exchange.
        services:
          - ehrbase
          - openehr-tool
          - hapi-fhir
          - blaze-fhir
          - lfh-fhir
          - fhir-gateway

      - name: Provisioning
        description: >
          Internal services used by the Platys generator to initialise and prepare a
          generated stack. Handles data provisioning, stack initialisation, and pre-pulling
          Docker images before the platform starts.
        services:
          - data-provisioning
          - platys-mdp-init
          - platys-mdp-docker-image-deploy
